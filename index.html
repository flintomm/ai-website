<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Tommy — Portfolio</title>
  <meta name="description" content="Tommy's portfolio. Dashboards and tools, built end-to-end." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --rule: #000000;
      --mute: #6b6b6b;
      --accent: #1f8a4c;
      --font: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --pad-x: clamp(1.25rem, 4vw, 3rem);
      --pad-y: clamp(1rem, 2.5vw, 1.4rem);
      --border: 1px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-weight: 400;
      line-height: 1.35;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    a { color: inherit; text-decoration: none; -webkit-touch-callout: none; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

    /* ===== HEADER ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--pad-y) + var(--safe-top)) calc(var(--pad-x) + var(--safe-right)) var(--pad-y) calc(var(--pad-x) + var(--safe-left));
      border-bottom: var(--border) solid var(--rule);
      flex-shrink: 0;
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    .brand {
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0;
      text-transform: none;
    }

    /* ===== MAIN ===== */
    main {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(220px, 26vw, 340px);
      min-height: 0;
    }

    /* ===== FEATURE (LinkedIn) ===== */
    .feature {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: clamp(1.5rem, 4vw, 3rem);
      padding: clamp(2rem, 5vw, 4rem) clamp(1.75rem, 5vw, 4rem);
      border-right: var(--border) solid var(--rule);
      color: var(--ink);
      text-decoration: none;
      overflow: hidden;
      min-width: 0;
    }

    .feature-title {
      font-size: clamp(3.5rem, 13vw, 11rem);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 0.9;
      display: flex;
      align-items: flex-start;
      gap: 0.18em;
      flex-wrap: wrap;
      transition: color 0.2s ease;
    }

    .feature-title .feature-arrow {
      display: inline-block;
      font-size: 0.4em;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      transform: translateY(0.5em);
      transition: transform 0.22s ease, color 0.22s ease;
      color: var(--mute);
    }

    @media (hover: hover) and (pointer: fine) {
      .feature:hover .feature-title { color: var(--accent); }
      .feature:hover .feature-arrow { color: var(--accent); transform: translate(0.3em, 0.25em); }
    }
    .feature:active .feature-title,
    .feature:focus-visible .feature-title { color: var(--accent); outline: none; }
    .feature:active .feature-arrow,
    .feature:focus-visible .feature-arrow { color: var(--accent); transform: translate(0.3em, 0.25em); }
    .feature:focus-visible { outline: none; }

    .feature-handle {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--mute);
    }

    /* ===== SIDE (Side Projects) ===== */
    .side {
      display: flex;
      flex-direction: column;
      min-width: 0;
      justify-content: flex-end;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1.25rem, 2.5vw, 1.75rem);
      gap: 0.25rem;
    }

    .side-link {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.55rem 0;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.16s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .side-link:hover { color: var(--accent); }
      .side-link:hover .side-arrow { transform: translateX(0.25rem); color: var(--accent); }
      .side-link:hover .side-desc { color: var(--accent); }
    }
    .side-link:active,
    .side-link:focus-visible { color: var(--accent); outline: none; }
    .side-link:active .side-arrow,
    .side-link:focus-visible .side-arrow { transform: translateX(0.25rem); color: var(--accent); }
    .side-link:active .side-desc,
    .side-link:focus-visible .side-desc { color: var(--accent); }

    .side-body { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }

    .side-name {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      line-height: 1.1;
    }

    .side-desc {
      font-size: 0.78rem;
      color: var(--mute);
      font-weight: 400;
      transition: color 0.16s ease;
    }

    .side-arrow {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1;
      color: var(--mute);
      transition: transform 0.18s ease, color 0.18s ease;
    }

    /* ===== FOOTER ===== */
    .footbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: var(--pad-y) calc(var(--pad-x) + var(--safe-right)) calc(var(--pad-y) + var(--safe-bottom)) calc(var(--pad-x) + var(--safe-left));
      border-top: var(--border) solid var(--rule);
      font-size: 0.78rem;
      color: var(--mute);
      font-weight: 400;
      flex-shrink: 0;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 880px) {
      main { grid-template-columns: 1fr; }
      .feature {
        border-right: none;
        border-bottom: var(--border) solid var(--rule);
        min-height: 60vh;
      }
      .side { padding: clamp(1.25rem, 4vw, 1.75rem); }
    }

    @media (max-width: 520px) {
      .feature { padding: 1.5rem 1.25rem; gap: 1.25rem; min-height: 56vh; }
      .feature-title { font-size: clamp(3rem, 18vw, 5.5rem); }
      .feature-handle { font-size: 0.85rem; }
      .side-link { padding: 0.5rem 0; min-height: 48px; }
      .side-name { font-size: 0.95rem; }
      .side-desc { font-size: 0.72rem; }
      .footbar { font-size: 0.72rem; }
    }

    @media (max-width: 380px) {
      .topbar { padding-top: calc(0.85rem + var(--safe-top)); padding-bottom: 0.85rem; }
      .feature-title { font-size: 2.8rem; }
    }

    /* iOS Safari: kill default tap halo on links */
    a, button { -webkit-tap-highlight-color: transparent; }

    /* ===== 3D TILT (LinkedIn feature) ===== */
    main { perspective: 1400px; }

    .feature {
      transform-style: preserve-3d;
      transform: rotateX(0) rotateY(0);
      transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
    }

    .feature.is-tilting {
      transition: none;
    }

    .feature-title,
    .feature-handle {
      transform: translateZ(24px);
    }

    .feature-handle {
      transform: translateZ(14px);
    }

    /* Reduced motion: kill the tilt entirely */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
      main { perspective: none; }
      .feature {
        transform: none !important;
        transform-style: flat;
        transition: none;
      }
      .feature-title,
      .feature-handle { transform: none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <span class="brand">Tommy</span>
  </header>

  <main>
    <a class="feature" href="https://www.linkedin.com/in/tphet" target="_blank" rel="noopener noreferrer">
      <h2 class="feature-title">LinkedIn<span class="feature-arrow" aria-hidden="true">↗</span></h2>
      <span class="feature-handle">in / tphet</span>
    </a>

    <aside class="side" aria-label="Side projects">
      <a class="side-link" href="pages/dashboards/roster-architect/roster-architect.html">
        <span class="side-body">
          <span class="side-name">Roster Architect</span>
          <span class="side-desc">Salary cap simulator</span>
        </span>
        <span class="side-arrow" aria-hidden="true">→</span>
      </a>
      <a class="side-link" href="pages/dashboards/budget-calculator/budget-calculator.html">
        <span class="side-body">
          <span class="side-name">Budget Calculator</span>
          <span class="side-desc">Planned vs actual</span>
        </span>
        <span class="side-arrow" aria-hidden="true">→</span>
      </a>
    </aside>
  </main>

  <footer class="footbar">
    <span>© 2026 Tommy</span>
  </footer>

  <script>
    (function () {
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;

      var feature = document.querySelector('.feature');
      if (!feature) return;

      var hasFinePointer = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;

      var MAX = 6;        // max degrees of tilt
      var GYRO_MAX = 7;   // mobile can take a touch more
      var LERP_DESKTOP = 0.09;
      var LERP_GYRO = 0.14;
      var GYRO_RANGE = 22; // degrees of phone tilt to reach max
      var EPS = 0.01;

      var trx = 0, try_ = 0; // target rotations
      var rx = 0, ry = 0;    // current rotations
      var lerp = LERP_DESKTOP;
      var inside = false;
      var raf = null;

      function setTarget(rxDeg, ryDeg) {
        trx = rxDeg; try_ = ryDeg;
        inside = true;
        ensureRunning();
      }

      function release() {
        trx = 0; try_ = 0;
        inside = false;
        ensureRunning();
      }

      function ensureRunning() {
        if (raf == null) raf = requestAnimationFrame(tick);
      }

      function tick() {
        rx += (trx - rx) * lerp;
        ry += (try_ - ry) * lerp;
        feature.style.transform = 'rotateX(' + rx.toFixed(3) + 'deg) rotateY(' + ry.toFixed(3) + 'deg)';
        var settled = !inside && Math.abs(rx) < EPS && Math.abs(ry) < EPS;
        if (settled) {
          feature.style.transform = '';
          feature.classList.remove('is-tilting');
          raf = null;
          return;
        }
        if (!feature.classList.contains('is-tilting')) feature.classList.add('is-tilting');
        raf = requestAnimationFrame(tick);
      }

      // ----- Desktop: mouse-driven tilt -----
      if (hasFinePointer) {
        document.addEventListener('mousemove', function (e) {
          var nx = (e.clientX / window.innerWidth) * 2 - 1;
          var ny = (e.clientY / window.innerHeight) * 2 - 1;
          lerp = LERP_DESKTOP;
          setTarget(-ny * MAX, nx * MAX);
        }, { passive: true });
        document.addEventListener('mouseleave', release);
        window.addEventListener('blur', release);
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) release();
        });
      }

      // ----- Mobile: gyroscope-driven tilt -----
      // First reading is captured as the neutral "zero" so the card
      // starts flat regardless of how the phone is held, then deltas
      // drive the tilt within +/- GYRO_RANGE degrees.
      var refBeta = null, refGamma = null;
      function onOrient(e) {
        if (e.beta == null && e.gamma == null) return;
        var beta = e.beta || 0;
        var gamma = e.gamma || 0;
        if (refBeta == null) { refBeta = beta; refGamma = gamma; return; }
        var dBeta = beta - refBeta;
        var dGamma = gamma - refGamma;
        var nx = Math.max(-1, Math.min(1, dGamma / GYRO_RANGE));
        var ny = Math.max(-1, Math.min(1, dBeta / GYRO_RANGE));
        lerp = LERP_GYRO;
        setTarget(-ny * GYRO_MAX, nx * GYRO_MAX);
      }

      function attachOrient() {
        window.addEventListener('deviceorientation', onOrient);
      }

      if (window.DeviceOrientationEvent && !hasFinePointer) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          // iOS 13+: must be requested from a user-gesture handler. The first
          // touch on the page kicks it off; a denial just leaves the page flat.
          var requested = false;
          var requestOnce = function () {
            if (requested) return;
            requested = true;
            try {
              DeviceOrientationEvent.requestPermission()
                .then(function (state) { if (state === 'granted') attachOrient(); })
                .catch(function () { /* denied or errored: stay flat */ });
            } catch (_) { /* stay flat */ }
          };
          document.addEventListener('touchstart', requestOnce, { once: true, passive: true });
          document.addEventListener('click', requestOnce, { once: true });
        } else {
          // Android/Chromium: no explicit permission required.
          attachOrient();
        }
      }
    })();
  </script>

</body>
</html>
