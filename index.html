<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Tommy — Portfolio</title>
  <meta name="description" content="Tommy's portfolio. Dashboards and tools, built end-to-end." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --rule: #000000;
      --mute: #6b6b6b;
      --accent: #1f8a4c;
      --font: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --pad-x: clamp(1.25rem, 4vw, 3rem);
      --pad-y: clamp(1rem, 2.5vw, 1.4rem);
      --border: 1px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-weight: 400;
      line-height: 1.35;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    a { color: inherit; text-decoration: none; -webkit-touch-callout: none; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

    /* ===== HEADER ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--pad-y) + var(--safe-top)) calc(var(--pad-x) + var(--safe-right)) var(--pad-y) calc(var(--pad-x) + var(--safe-left));
      border-bottom: var(--border) solid var(--rule);
      flex-shrink: 0;
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    .brand {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .brand-dot {
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      background: var(--accent);
      margin-left: 0.45em;
      vertical-align: 0.05em;
    }

    .topbar-meta {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
    }

    /* ===== MAIN ===== */
    main {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(220px, 26vw, 340px);
      min-height: 0;
    }

    /* ===== FEATURE (LinkedIn) ===== */
    .feature {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: clamp(1.5rem, 4vw, 3rem);
      padding: clamp(1.75rem, 4vw, 3rem) clamp(1.5rem, 4vw, 3rem);
      border-right: var(--border) solid var(--rule);
      color: var(--ink);
      text-decoration: none;
      transition: background 0.18s ease, color 0.18s ease;
      overflow: hidden;
      min-width: 0;
    }

    .feature::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: var(--accent);
      transition: width 0.22s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .feature:hover { background: var(--ink); color: var(--bg); }
      .feature:hover::before { width: 0.55rem; }
    }
    .feature:active,
    .feature:focus-visible { background: var(--ink); color: var(--bg); outline: none; }
    .feature:active::before,
    .feature:focus-visible::before { width: 0.55rem; }

    .feature-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--mute);
    }
    .feature-eyebrow .accent { color: var(--accent); margin-right: 0.4em; }

    .feature-title {
      font-size: clamp(3.5rem, 14vw, 12rem);
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 0.85;
      text-transform: uppercase;
      display: flex;
      align-items: flex-start;
      gap: 0.18em;
      flex-wrap: wrap;
    }

    .feature-title .feature-arrow {
      display: inline-block;
      font-size: 0.6em;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0;
      transform: translateY(0.05em);
      transition: transform 0.22s ease, color 0.22s ease;
      color: var(--accent);
    }

    @media (hover: hover) and (pointer: fine) {
      .feature:hover .feature-arrow { transform: translate(0.3em, -0.2em); color: var(--accent); }
    }
    .feature:active .feature-arrow,
    .feature:focus-visible .feature-arrow { transform: translate(0.3em, -0.2em); color: var(--accent); }

    .feature-foot {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .feature-handle {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .feature-cta {
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--accent);
    }

    /* ===== SIDE (Side Projects) ===== */
    .side {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    .side-label {
      padding: 0.9rem clamp(1rem, 2vw, 1.4rem);
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
      border-bottom: var(--border) solid var(--rule);
    }
    .side-label .accent { color: var(--accent); margin-right: 0.4em; }

    .side-link {
      flex: 1 1 0;
      position: relative;
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem clamp(1rem, 2vw, 1.4rem);
      border-bottom: var(--border) solid var(--rule);
      color: var(--ink);
      text-decoration: none;
      min-height: 0;
      transition: background 0.14s ease, color 0.14s ease;
    }
    .side-link:last-child { border-bottom: none; }

    .side-link::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--accent);
      transition: width 0.18s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .side-link:hover { background: var(--ink); color: var(--bg); }
      .side-link:hover::before { width: 0.3rem; }
    }
    .side-link:active,
    .side-link:focus-visible { background: var(--ink); color: var(--bg); outline: none; }
    .side-link:active::before,
    .side-link:focus-visible::before { width: 0.3rem; }

    .side-num {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      font-weight: 500;
      color: var(--mute);
    }
    @media (hover: hover) and (pointer: fine) {
      .side-link:hover .side-num { color: var(--accent); }
    }
    .side-link:active .side-num,
    .side-link:focus-visible .side-num { color: var(--accent); }

    .side-body { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }

    .side-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.005em;
      text-transform: uppercase;
      line-height: 1.05;
    }

    .side-desc {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
    }
    @media (hover: hover) and (pointer: fine) {
      .side-link:hover .side-desc { color: rgba(255, 255, 255, 0.65); }
    }
    .side-link:active .side-desc,
    .side-link:focus-visible .side-desc { color: rgba(255, 255, 255, 0.65); }

    .side-arrow {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .side-link:hover .side-arrow { color: var(--accent); transform: translateX(0.25rem); }
    }
    .side-link:active .side-arrow,
    .side-link:focus-visible .side-arrow { color: var(--accent); transform: translateX(0.25rem); }

    /* ===== FOOTER ===== */
    .footbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--pad-y) calc(var(--pad-x) + var(--safe-right)) calc(var(--pad-y) + var(--safe-bottom)) calc(var(--pad-x) + var(--safe-left));
      border-top: var(--border) solid var(--rule);
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
      flex-shrink: 0;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    .footbar .accent { color: var(--accent); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 880px) {
      main {
        grid-template-columns: 1fr;
      }
      .feature {
        border-right: none;
        border-bottom: var(--border) solid var(--rule);
        min-height: 58vh;
      }
    }

    @media (max-width: 520px) {
      .topbar-meta { display: none; }
      .feature { padding: 1.4rem 1.25rem; gap: 1.25rem; min-height: 54vh; }
      .feature-title { font-size: clamp(3rem, 18vw, 5.5rem); letter-spacing: -0.04em; }
      .feature-eyebrow { font-size: 0.62rem; letter-spacing: 0.26em; }
      .feature-handle { font-size: 0.78rem; letter-spacing: 0.16em; }
      .feature-cta { font-size: 0.62rem; letter-spacing: 0.26em; }
      .side-label { font-size: 0.55rem; padding: 0.7rem 1rem; }
      .side-link { padding: 0.75rem 1rem; min-height: 56px; grid-template-columns: 1.6rem 1fr auto; gap: 0.6rem; }
      .side-name { font-size: 0.88rem; }
      .side-desc { font-size: 0.58rem; letter-spacing: 0.14em; }
      .footbar { font-size: 0.58rem; letter-spacing: 0.2em; }
    }

    @media (max-width: 380px) {
      .topbar { padding-top: calc(0.85rem + var(--safe-top)); padding-bottom: 0.85rem; }
      .feature-title { font-size: 2.8rem; }
    }

    /* iOS Safari: kill default tap halo on links */
    a, button { -webkit-tap-highlight-color: transparent; }

    /* ===== LENS (pixel-lift effect) ===== */
    #lens, .lens-chip {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      backdrop-filter: invert(1) contrast(1.05);
      -webkit-backdrop-filter: invert(1) contrast(1.05);
      transform: translate3d(-9999px, -9999px, 0);
      will-change: transform;
    }

    #lens {
      width: 72px;
      height: 72px;
      border: 1px solid var(--ink);
      box-shadow: 4px 4px 0 0 rgba(0,0,0,0.18), 0 0 0 1px var(--accent) inset;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    #lens.is-active { opacity: 1; }

    .lens-chip {
      border: 1px solid rgba(0,0,0,0.55);
    }

    /* No backdrop-filter support → degrade to a clean ink-square cursor + no trail */
    @supports not ((backdrop-filter: invert(1)) or (-webkit-backdrop-filter: invert(1))) {
      #lens {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: var(--ink);
        mix-blend-mode: difference;
      }
      .lens-chip { display: none; }
    }

    @media (max-width: 520px) {
      #lens { width: 56px; height: 56px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
      #lens, .lens-chip { display: none !important; }
    }
  </style>
</head>
<body>

  <div id="lens" aria-hidden="true"></div>

  <header class="topbar">
    <span class="brand">Tommy<span class="brand-dot" aria-hidden="true"></span></span>
    <span class="topbar-meta">Portfolio / 2026</span>
  </header>

  <main>
    <a class="feature" href="https://www.linkedin.com/in/tphet" target="_blank" rel="noopener noreferrer">
      <span class="feature-eyebrow"><span class="accent">●</span>01 / Connect</span>
      <h2 class="feature-title">LinkedIn<span class="feature-arrow" aria-hidden="true">↗</span></h2>
      <div class="feature-foot">
        <span class="feature-handle">in / tphet</span>
        <span class="feature-cta">Open Profile</span>
      </div>
    </a>

    <aside class="side" aria-label="Side projects">
      <p class="side-label"><span class="accent">●</span>Side Projects</p>
      <a class="side-link" href="pages/dashboards/roster-architect/roster-architect.html">
        <span class="side-num">01</span>
        <span class="side-body">
          <span class="side-name">Roster Architect</span>
          <span class="side-desc">NBA simulator · cap engine</span>
        </span>
        <span class="side-arrow" aria-hidden="true">→</span>
      </a>
      <a class="side-link" href="pages/dashboards/budget-calculator/budget-calculator.html">
        <span class="side-num">02</span>
        <span class="side-body">
          <span class="side-name">Budget Calculator</span>
          <span class="side-desc">Planned vs actual · charts</span>
        </span>
        <span class="side-arrow" aria-hidden="true">→</span>
      </a>
    </aside>
  </main>

  <footer class="footbar">
    <span>v2.0 <span class="accent">●</span> Index</span>
    <span>© 2026 Tommy</span>
  </footer>

  <script>
    (function () {
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;

      var lens = document.getElementById('lens');
      if (!lens) return;

      var lensSize = function () { return parseFloat(getComputedStyle(lens).width) || 72; };

      var rect = { half: lensSize() / 2 };
      var GRID = 4;
      var FOLLOW = 0.22;          // lerp factor (higher = snappier)
      var DROP_DIST = 26;         // min px between trail chip drops
      var MAX_CHIPS = 8;
      var CHIP_SIZES = [56, 40, 24, 14, 8]; // step-down sequence
      var CHIP_STEP_MS = 60;       // ms between size steps
      var IDLE_HIDE_MS = 250;      // hide lens this long after pointer leaves

      var x = 0, y = 0, tx = 0, ty = 0;
      var primed = false;          // have we received any input yet?
      var active = false;
      var hideTimer = null;
      var lastDropX = -9999, lastDropY = -9999;
      var chips = [];
      var lastPointerType = 'mouse';

      function snap(v) { return Math.round(v / GRID) * GRID; }

      function setActive(on) {
        if (active === on) return;
        active = on;
        lens.classList.toggle('is-active', on);
      }

      function scheduleHide() {
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(function () { setActive(false); }, IDLE_HIDE_MS);
      }

      function point(px, py) {
        tx = px; ty = py;
        if (!primed) { x = tx; y = ty; primed = true; }
        setActive(true);
        if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      }

      function release() {
        scheduleHide();
      }

      function dropChip(px, py) {
        if (chips.length >= MAX_CHIPS) {
          var old = chips.shift();
          if (old.timers) old.timers.forEach(clearTimeout);
          if (old.el && old.el.parentNode) old.el.parentNode.removeChild(old.el);
        }
        var startSize = CHIP_SIZES[0];
        var el = document.createElement('div');
        el.className = 'lens-chip';
        el.style.width = startSize + 'px';
        el.style.height = startSize + 'px';
        el.style.transform = 'translate3d(' + (snap(px) - startSize / 2) + 'px,' + (snap(py) - startSize / 2) + 'px,0)';
        document.body.appendChild(el);

        var timers = [];
        for (var i = 1; i < CHIP_SIZES.length; i++) {
          (function (size, idx) {
            timers.push(setTimeout(function () {
              if (!el.parentNode) return;
              el.style.width = size + 'px';
              el.style.height = size + 'px';
              el.style.transform = 'translate3d(' + (snap(px) - size / 2) + 'px,' + (snap(py) - size / 2) + 'px,0)';
            }, idx * CHIP_STEP_MS));
          })(CHIP_SIZES[i], i);
        }
        timers.push(setTimeout(function () {
          if (el.parentNode) el.parentNode.removeChild(el);
          var ix = chips.indexOf(record);
          if (ix >= 0) chips.splice(ix, 1);
        }, CHIP_SIZES.length * CHIP_STEP_MS));

        var record = { el: el, timers: timers };
        chips.push(record);
      }

      // ---- Pointer wiring ----
      // Use Pointer Events when available; fall back to mouse + touch.
      if (window.PointerEvent) {
        document.addEventListener('pointermove', function (e) {
          lastPointerType = e.pointerType || 'mouse';
          point(e.clientX, e.clientY);
        }, { passive: true });
        document.addEventListener('pointerdown', function (e) {
          lastPointerType = e.pointerType || 'mouse';
          point(e.clientX, e.clientY);
        }, { passive: true });
        document.addEventListener('pointerup', release);
        document.addEventListener('pointercancel', release);
        document.addEventListener('pointerleave', release);
      } else {
        document.addEventListener('mousemove', function (e) {
          point(e.clientX, e.clientY);
        }, { passive: true });
        document.addEventListener('mouseleave', release);
        document.addEventListener('touchstart', function (e) {
          var t = e.touches[0]; if (t) point(t.clientX, t.clientY);
        }, { passive: true });
        document.addEventListener('touchmove', function (e) {
          var t = e.touches[0]; if (t) point(t.clientX, t.clientY);
        }, { passive: true });
        document.addEventListener('touchend', release, { passive: true });
        document.addEventListener('touchcancel', release, { passive: true });
      }

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) setActive(false);
      });

      function tick() {
        if (primed) {
          // Smooth follow (lerp). Snap final position to grid for crisp pixel feel.
          x += (tx - x) * FOLLOW;
          y += (ty - y) * FOLLOW;
          var size = lensSize();
          var sx = snap(x), sy = snap(y);
          lens.style.transform = 'translate3d(' + (sx - size / 2) + 'px,' + (sy - size / 2) + 'px,0)';

          if (active) {
            var dx = sx - lastDropX, dy = sy - lastDropY;
            if (dx * dx + dy * dy >= DROP_DIST * DROP_DIST) {
              dropChip(sx, sy);
              lastDropX = sx; lastDropY = sy;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

</body>
</html>
