<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Games | Tower Defense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fff;
        --surface: #f5f5f5;
        --border: rgba(0,0,0,0.12);
        --border-hi: rgba(0,0,0,0.28);
        --text: #000;
        --muted: #666;
        --accent: #ff3333;
        --font: "Ubuntu", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ===== SITE NAV ===== */
      .site-nav {
        padding: 1.2rem 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .back-link {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.15s;
      }

      .back-link:hover { color: var(--accent); }

      .site-tag {
        font-size: 0.62rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 300;
      }

      /* ===== LAYOUT ===== */
      body > header {
        padding: 2rem clamp(1.5rem, 4vw, 3rem) 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 2rem;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        font-family: var(--font);
      }

      h2 {
        margin: 0 0 0.75rem;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-family: var(--font);
      }

      p {
        margin: 0.4rem 0 0;
        color: var(--muted);
        max-width: 55ch;
        line-height: 1.6;
        font-size: 0.85rem;
      }

      main {
        display: grid;
        gap: 1px;
        grid-template-columns: minmax(0, 2.2fr) minmax(0, 1fr);
        padding: 1.5rem clamp(1.5rem, 4vw, 3rem);
        gap: 1.5rem;
      }

      /* ===== PANELS ===== */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.5rem;
      }

      .game-wrap {
        display: grid;
        gap: 1rem;
      }

      .arena {
        position: relative;
      }

      #game {
        width: 100%;
        aspect-ratio: 960 / 712;
        background: #000;
        border: 1px solid var(--border);
        display: block;
      }

      /* Decorative overlays removed */
      .scanlines,
      .neon-flicker { display: none; }

      /* ===== CONTROLS ===== */
      .controls {
        display: grid;
        gap: 0.6rem;
      }

      .controls button {
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-hi);
        background: #fff;
        color: #000;
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: var(--font);
        transition: background 0.15s, color 0.15s;
      }

      .controls button:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .controls button.secondary {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }

      .controls button.secondary:hover {
        color: var(--text);
        border-color: var(--border-hi);
      }

      .controls button.warning {
        background: #fff;
        color: #000;
        border-color: var(--border-hi);
      }

      .controls button.warning:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .controls button.danger {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }

      .controls button.danger:hover {
        color: var(--text);
        border-color: var(--border-hi);
      }

      /* ===== TOWER CARDS ===== */
      .tower-list {
        display: grid;
        gap: 0.5rem;
      }

      .tower-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 0.75rem;
        display: grid;
        gap: 0.3rem;
        text-align: left;
        font: inherit;
        color: var(--text);
        cursor: pointer;
        transition: border-color 0.15s;
        font-family: var(--font);
      }

      .tower-card:hover {
        border-color: var(--border-hi);
      }

      .tower-card span {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.06em;
      }

      .tower-card.active {
        border-color: var(--accent);
        border-left-width: 3px;
        background: #fff;
      }

      .tower-inspect {
        margin-top: 1rem;
        padding: 0.9rem;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 0.82rem;
        color: var(--muted);
      }

      /* ===== HUD OVERLAY ===== */
      .hud-bar {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
      }

      .hud-group {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        flex-direction: column;
        gap: 0.15rem;
        background: rgba(0,0,0,0.85);
        border: 1px solid var(--border-hi);
        padding: 0.45rem 0.7rem;
        font-size: 0.72rem;
        font-weight: 700;
        min-width: 72px;
        align-items: center;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .chip strong {
        font-size: 0.95rem;
        letter-spacing: 0;
        text-transform: none;
      }

      .chip.good strong { color: #fff; }
      .chip.warn strong { color: #999; }
      .chip.bad  strong { color: #666; }

      .status-pill {
        padding: 0.3rem 0.65rem;
        border: 1px solid var(--border-hi);
        background: rgba(0,0,0,0.85);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .note {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.5;
        letter-spacing: 0.08em;
      }

      code { color: var(--muted); }

      @media (max-width: 980px) {
        main { grid-template-columns: 1fr; }
        .site-nav { padding: 1rem 1.2rem; }
        body > header { padding: 1.5rem 1.2rem 1rem; }
        main { padding: 1rem 1.2rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <a class="back-link" href="../../index.html#section-4">← Flint</a>
      <span class="site-tag">Digital Games</span>
    </nav>
    <header>
      <div>
        <h1>Tower Defense</h1>
        <p>Place towers, stop incoming waves, and keep the core alive. Click on the grid to place towers.</p>
      </div>
      <div class="note">Tip: Select a tower, then click on the map.</div>
    </header>

    <main>
      <section class="panel game-wrap">
        <div class="arena">
          <canvas id="game" width="960" height="712" aria-label="Tower defense game canvas"></canvas>
          <div class="scanlines"></div>
          <div class="neon-flicker"></div>
          <div class="hud-bar" aria-hidden="true">
            <div class="hud-group">
              <div class="chip good"><span>Credits</span><strong id="hud-credits">250</strong></div>
              <div class="chip"><span>Wave</span><strong id="hud-wave">1</strong></div>
              <div class="chip warn"><span>Enemies</span><strong id="hud-enemies">0</strong></div>
              <div class="chip bad"><span>Lives</span><strong id="hud-lives">20</strong></div>
            </div>
            <div class="status-pill" id="hud-status">Build mode</div>
          </div>
        </div>
      </section>

      <aside class="panel">
        <h2>Build Menu</h2>
        <div class="tower-list" id="tower-list"></div>
        <div class="tower-inspect" id="tower-inspect"></div>

        <div class="controls" style="margin-top: 1rem;">
          <button id="start-wave" class="warning">Start Next Wave</button>
          <button id="toggle-pause" class="secondary">Pause</button>
          <button id="reset-game" class="danger">Reset</button>
        </div>

      </aside>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
